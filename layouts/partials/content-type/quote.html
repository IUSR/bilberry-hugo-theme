<a class="bubble" href="{{ .ctx.Permalink }}">
    <i class="fas fa-fw {{or .ctx.Params.icon "fa-quote-right" }}"></i>
</a>

<article class="quote">
    {{ $featuredImageAlt := partial "featured-image-data.html" .ctx }}
    {{ with .ctx.Params.featuredImage }}
        {{ if not (reflect.IsMap .) }}
        <img src="{{ . | relURL }}" class="featured-image" alt="{{ $featuredImageAlt }}"{{ with $featuredImageAlt }} title="{{ . }}"{{ end }}>
        {{ end }}
    {{ end }}

    <blockquote>
        {{ .ctx.Content }}
        {{ $urlValue := replace .ctx.Params.author " " "-" | lower}}
        <cite>
            <a href="{{ (print "/author/" $urlValue) | relLangURL }}">
                {{ .ctx.Params.author }}
            </a>
        </cite>
    </blockquote>
</article>
